<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GUIA COMERCIAL EXPRESS — CLAROVTR</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* Fuentes corporativas AMX (Claro) */
@font-face{font-family:'AMX';src:url('assets/fonts/AMX-Regular.woff2') format('woff2');font-weight:400;font-display:swap}
@font-face{font-family:'AMX';src:url('assets/fonts/AMX-Medium.woff2') format('woff2');font-weight:500;font-display:swap}
@font-face{font-family:'AMX';src:url('assets/fonts/AMX-Bold.woff2') format('woff2');font-weight:700;font-display:swap}
@font-face{font-family:'AMX';src:url('assets/fonts/AMX-Bold.woff2') format('woff2');font-weight:800;font-display:swap}
@font-face{font-family:'AMX';src:url('assets/fonts/AMX-Bold.woff2') format('woff2');font-weight:900;font-display:swap}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'AMX','Nunito',sans-serif;background:#f0f0f0;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:20px}
.app{width:100%;max-width:480px;background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,.12);overflow:hidden}

/* ── HEADER ──────────────────────────────────────────────────────── */
.app-header{background:#E30613;padding:16px 18px 14px;display:flex;align-items:center;gap:14px}
.logo-block{flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.logo-main{font-size:22px;font-weight:900;color:#fff;letter-spacing:2px;line-height:1;text-transform:uppercase;font-family:'AMX','Nunito',sans-serif}
.logo-sub{font-size:8px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:3px;text-transform:uppercase;margin-top:2px}
.logo-block-official{flex-shrink:0;background:#000;border-radius:8px;padding:5px 8px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.25)}
.logo-svg-wrap{display:block}
.logo-svg-wrap.header-logo-wrap{height:30px;width:auto;line-height:0}
.logo-svg-wrap.header-logo-wrap svg{height:30px;width:auto;display:block}
.logo-svg-wrap.overlay-logo-wrap{width:200px;line-height:0;border-radius:10px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.35)}
.logo-svg-wrap.overlay-logo-wrap svg{width:100%;height:auto;display:block}
.header-divider{width:1.5px;height:42px;background:rgba(255,255,255,.32);flex-shrink:0}
.header-info{flex:1;min-width:0}

/* \u00CDconos corporativos doodle (estilo Claro a mano alzada) */
.icon-corp{display:inline-block;vertical-align:middle;line-height:0}
.icon-corp img{display:block;width:100%;height:100%;object-fit:contain}
.icon-corp.size-sm{width:18px;height:18px}
.icon-corp.size-md{width:28px;height:28px}
.icon-corp.size-lg{width:48px;height:48px}
.icon-corp.size-xl{width:72px;height:72px}

/* Banner corporativo (gigas libres etc) */
.corp-banner{margin:0 0 12px;border-radius:12px;overflow:hidden;display:block;box-shadow:0 3px 10px rgba(227,6,19,.18)}
.corp-banner img{width:100%;height:auto;display:block}
.app-title{color:#fff;font-size:14px;font-weight:900;line-height:1.2}
.app-sub{color:rgba(255,255,255,.7);font-size:10px;font-weight:600;margin-top:2px}
.update-badge{background:rgba(0,0,0,.2);border-radius:6px;padding:2px 8px;font-size:9px;font-weight:800;color:rgba(255,255,255,.9);margin-top:5px;display:inline-block;letter-spacing:.3px}

.body{padding:18px}
.breadcrumb{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px;min-height:18px}
.bc-item{font-size:11px;color:#888;display:flex;align-items:center;gap:3px}
.bc-item:not(:last-child)::after{content:"›";opacity:.5}
.bc-item.active{color:#E30613;font-weight:800}
.screen{animation:fadeIn .22s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.qbox{background:#f8f8f8;border-radius:14px;padding:16px;margin-bottom:14px;border-left:4px solid #E30613}
.qicon{font-size:26px;margin-bottom:6px;line-height:1}
.qtext{font-size:16px;font-weight:900;color:#1a1a1a;line-height:1.3}
.qhint{font-size:12px;color:#888;margin-top:4px}
.choices{display:grid;gap:10px}
.choices.cols2{grid-template-columns:1fr 1fr}
.choice-btn{border:1.5px solid #e0e0e0;border-radius:14px;padding:14px 12px;background:#fff;cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:center;gap:10px;width:100%}
.choice-btn:hover{border-color:#E30613;background:#fff5f5;transform:translateY(-2px);box-shadow:0 4px 12px rgba(227,6,19,.1)}
.choice-icon{font-size:24px;flex-shrink:0;line-height:1}
.choice-label{font-size:14px;font-weight:800;color:#1a1a1a;line-height:1.2}
.choice-desc{font-size:11px;color:#888;margin-top:2px;font-weight:400}

/* ── CARDS ───────────────────────────────────────────────────────── */
.offers-grid{display:grid;gap:9px}
.offer-card{border-radius:12px;padding:12px 12px 10px 14px;border:1px solid #eee;background:#fff;position:relative;overflow:hidden}
.offer-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px;background:#E30613}
.offer-card.gold::before{background:#F59E0B}
.offer-card.teal::before{background:#10B981}
.offer-card.blue::before{background:#3B82F6}
.offer-card.purple::before{background:#7C3AED}
.offer-card.star-card{background:linear-gradient(135deg,#FFFBEB 0%,#FEF3C7 100%);border:2px solid #F59E0B}
.offer-card.star-card::before{background:linear-gradient(180deg,#F59E0B,#D97706);width:5px}
.star-badge{display:inline-flex;align-items:center;gap:4px;background:#F59E0B;color:#fff;font-size:10px;font-weight:900;padding:2px 8px;border-radius:20px;margin-bottom:6px}
.offer-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.offer-name{font-size:12px;font-weight:800;color:#1a1a1a;line-height:1.3}
.offer-price{font-size:20px;font-weight:900;color:#E30613;line-height:1;white-space:nowrap}
.offer-price.star-price{color:#D97706;font-size:22px}
.offer-period{font-size:10px;color:#aaa;text-align:right}
.price-row{display:flex;gap:8px;align-items:center;margin-top:5px;flex-wrap:wrap}
.price-original{font-size:11px;color:#aaa;text-decoration:line-through}
.price-promo{font-size:13px;font-weight:800;color:#E30613}
.price-tactico{font-size:15px;font-weight:900;color:#D97706}

/* ── TAGS ────────────────────────────────────────────────────────── */
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.tag{font-size:10px;font-weight:800;padding:2.5px 7px;border-radius:20px}
.tag-green{background:#D1FAE5;color:#065F46}
.tag-red{background:#FEE2E2;color:#991B1B}
.tag-amber{background:#FEF3C7;color:#92400E}
.tag-blue{background:#DBEAFE;color:#1E40AF}
.tag-gray{background:#F3F4F6;color:#374151}
.tag-gold{background:#FEF9C3;color:#854D0E;border:1px solid #FDE047}
.tag-purple{background:#EDE9FE;color:#5B21B6}

/* ── BOXES ───────────────────────────────────────────────────────── */
.warn-box{background:#FFFBEB;border:1.5px solid #F59E0B;border-radius:10px;padding:9px 11px;margin-top:8px;display:flex;gap:7px;align-items:flex-start}
.warn-icon{font-size:14px;flex-shrink:0}
.warn-text{font-size:11px;font-weight:700;color:#78350F;line-height:1.4}
.info-box{background:#EFF6FF;border:1.5px solid #93C5FD;border-radius:10px;padding:9px 11px;margin-top:8px;display:flex;gap:7px;align-items:flex-start}
.info-text{font-size:11px;font-weight:700;color:#1E40AF;line-height:1.4}
.disclaimer-box{background:#FFF7ED;border:1.5px solid #FB923C;border-radius:10px;padding:9px 11px;margin-bottom:12px;display:flex;gap:7px;align-items:flex-start}
.disclaimer-text{font-size:11px;font-weight:800;color:#9A3412;line-height:1.4}
/* Bullets de Verticales (sin ul/li, evita números nativos) */
.vert-bullets{margin-top:6px;display:flex;flex-direction:column;gap:3px}
.vert-bullet{padding-left:14px;position:relative;font-weight:700;line-height:1.45}
.vert-bullet::before{content:'•';position:absolute;left:2px;color:#E30613;font-size:14px;font-weight:900;top:-1px}

/* L\u00EDnea Adicional warn box */
.la-warn-box{background:linear-gradient(135deg,#FEF2F2 0%,#FFE4E1 100%);border:1.5px solid #E30613;border-left:4px solid #E30613;border-radius:10px;padding:10px 12px;margin-bottom:12px;display:flex;gap:8px;align-items:flex-start;box-shadow:0 2px 6px rgba(227,6,19,.1)}
.la-warn-text{font-size:11px;font-weight:800;color:#7F1D1D;line-height:1.45;flex:1}
.la-warn-text strong{color:#9F1239}
/* Bullets de L\u00EDnea Adicional (sin ul/li, evita números nativos) */
.la-bullets{margin-top:5px;display:flex;flex-direction:column;gap:3px}
.la-bullet{padding-left:16px;position:relative;font-weight:700;color:#7F1D1D;line-height:1.45}
.la-bullet::before{content:'▸';position:absolute;left:2px;color:#E30613;font-size:11px;top:1px;font-weight:900}
.la-bullet strong{color:#991B1B;font-weight:900}
.tnt-box{background:#1a1a1a;border-radius:10px;padding:10px 13px;margin-top:8px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.tnt-label{color:#fff;font-size:11px;font-weight:900;line-height:1.3}
.tnt-promo{text-align:right}
.tnt-price{color:#FCD34D;font-size:18px;font-weight:900;line-height:1}
.tnt-note{color:rgba(255,255,255,.55);font-size:9px;margin-top:2px}

/* ── MISC ────────────────────────────────────────────────────────── */
.divider{height:1px;background:#f0f0f0;margin:12px 0}
.section-label{font-size:10px;font-weight:900;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px}
.section-label.red{color:#E30613}
.mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.mini-card{background:#f8f8f8;border-radius:10px;padding:9px 10px;border:1px solid #eee}
.mini-price{font-size:16px;font-weight:900;color:#E30613}
.mini-label{font-size:10px;color:#888;margin-top:2px}
.mini-card.green{background:#ECFDF5;border-color:#6EE7B7}
.mini-card.green .mini-price{color:#065F46}

/* ── PRICE LIST ──────────────────────────────────────────────────── */
.pl-card{border-radius:10px;padding:10px 12px;border:1px solid #eee;background:#fff;margin-bottom:7px;position:relative;overflow:hidden}
.pl-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#E30613}
.pl-card.star{background:#FFFBEB;border-color:#FDE68A}
.pl-card.star::before{background:#F59E0B}
.pl-header{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.pl-name{font-size:11px;font-weight:800;color:#1a1a1a;line-height:1.3;flex:1}
.pl-marca{font-size:9px;color:#888;background:#f3f4f6;padding:1px 5px;border-radius:4px;font-weight:700;white-space:nowrap}
.pl-prices{display:flex;gap:6px;align-items:center;margin-top:5px;flex-wrap:wrap}
.pl-base{font-size:10px;color:#aaa;text-decoration:line-through}
.pl-promo{font-size:12px;font-weight:900;color:#E30613}
.pl-tac{font-size:13px;font-weight:900;color:#D97706}
.pl-lbl{font-size:9px;font-weight:800;padding:1px 5px;border-radius:4px;background:#f3f4f6;color:#374151}
.pl-lbl.tac{background:#FEF3C7;color:#92400E}
.speed-group{background:#1a1a1a;border-radius:8px;padding:5px 10px;margin:10px 0 6px;display:flex;align-items:center;gap:6px}
.speed-label{font-size:10px;font-weight:900;color:#fff}
.speed-badge{background:#E30613;color:#fff;font-size:9px;font-weight:900;padding:2px 7px;border-radius:10px}

/* ── OTT IN PLAN CARD ────────────────────────────────────────────── */
.pl-ott{margin-top:7px;padding-top:7px;border-top:1px dashed #e5e7eb}
.pl-ott-header{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.pl-ott-label{font-size:9px;font-weight:900;color:#6B7280;text-transform:uppercase;letter-spacing:.05em}
.pl-ott-nivel{font-size:9px;font-weight:900;padding:1px 7px;border-radius:10px}
.pl-ott-nivel.inicia{background:#EDE9FE;color:#5B21B6}
.pl-ott-nivel.plus{background:#FEF3C7;color:#92400E}
.pl-ott-nivel.premium{background:#D1FAE5;color:#065F46}
.pl-ott-apps{display:flex;flex-wrap:wrap;gap:3px}
.pl-ott-app{font-size:9px;font-weight:800;padding:2px 6px;border-radius:5px;white-space:nowrap}
.pa-hbo    {background:#1a1a2e;color:#E5C07B}
.pa-prime  {background:#1B6CC8;color:#fff}
.pa-disney {background:#0F3B96;color:#fff}
.pa-fanatiz{background:#EA580C;color:#fff}
.pa-teatrix{background:#78350F;color:#fff}
.pa-uplus  {background:#9A3412;color:#fff}
.pa-riivi  {background:#6B21A8;color:#fff}
.pa-tvnplay{background:#CC0000;color:#fff}
.pa-atres  {background:#E11D48;color:#fff}
.pa-cindie {background:#16A34A;color:#fff}
.pa-onda   {background:#0891B2;color:#fff}
.pa-none   {background:#F3F4F6;color:#9CA3AF;font-style:italic}

/* ── TABLE ───────────────────────────────────────────────────────── */
.la-table{width:100%;border-collapse:collapse;margin-top:4px}
.la-table th{background:#1a1a1a;color:#fff;font-size:10px;font-weight:800;padding:7px 8px;text-align:center}
.la-table td{font-size:11px;padding:7px 8px;border-bottom:1px solid #f0f0f0;text-align:center;font-weight:600}
.la-table tr:nth-child(even) td{background:#f8f8f8}
.la-table td:first-child{text-align:left;font-weight:700;color:#374151}
.la-na{color:#991B1B;background:#FEE2E2;border-radius:6px;padding:1px 6px;font-size:10px}
.la-price{color:#E30613;font-size:13px;font-weight:900}

/* ── OTT FULL VIEW ───────────────────────────────────────────────── */
.ott-tier{border-radius:14px;overflow:hidden;margin-bottom:10px;border:1.5px solid #e0e0e0}
.ott-tier-header{padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.ott-inicia  {background:linear-gradient(90deg,#7E22CE,#9333EA)}
.ott-plus    {background:linear-gradient(90deg,#B45309,#D97706)}
.ott-premium {background:linear-gradient(90deg,#065F46,#059669)}
.ott-inicia-c{background:linear-gradient(90deg,#9B1B1B,#E30613)}
.ott-plus-c  {background:linear-gradient(90deg,#92400E,#D97706)}
.ott-premium-c{background:linear-gradient(90deg,#1E3A8A,#2563EB)}
.ott-tier-name{color:#fff;font-size:14px;font-weight:900}
.ott-stats{display:flex;gap:6px}
.ott-stat{background:rgba(255,255,255,.2);border-radius:8px;padding:3px 8px;text-align:center}
.ott-stat-num{font-size:14px;font-weight:900;color:#fff;line-height:1}
.ott-stat-lbl{font-size:8px;color:rgba(255,255,255,.8);font-weight:700}
.ott-body{padding:10px 12px;background:#fafafa}
.ott-streaming-title{font-size:9px;font-weight:900;color:#888;text-transform:uppercase;margin-bottom:6px}
.ott-apps{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.ott-app{border-radius:6px;padding:4px 9px;font-size:10px;font-weight:900;white-space:nowrap}
.app-hbo    {background:#1a1a2e;color:#E5C07B}
.app-prime  {background:#1B6CC8;color:#fff}
.app-disney {background:#0F3B96;color:#fff}
.app-fanatiz{background:#EA580C;color:#fff}
.app-teatrix{background:#78350F;color:#fff}
.app-uplus  {background:#EA580C;color:#fff}
.app-tnplay {background:#CC0000;color:#fff}
.app-riivi  {background:#6B21A8;color:#fff}
.app-tvnplay{background:#CC0000;color:#fff}
.app-atresplayer{background:#E11D48;color:#fff}
.app-cindie {background:#16A34A;color:#fff}
.app-ondamedia{background:#0891B2;color:#fff}
.ott-note{font-size:10px;color:#888;font-style:italic;margin-top:5px;line-height:1.4;background:#f3f4f6;border-radius:6px;padding:5px 7px}

/* ── CHANNEL GRID ────────────────────────────────────────────────── */
.ch-section{background:#1a1a1a;border-radius:10px;padding:10px 12px;margin-bottom:10px}
.ch-section-title{font-size:11px;font-weight:900;color:#fff;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.ch-count{background:#E30613;color:#fff;font-size:9px;font-weight:900;padding:2px 7px;border-radius:10px}
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:6px;padding-top:4px}
.ch-item{background:#2a2a2a;border-radius:6px;padding:5px 5px 4px;text-align:center;position:relative;border:1px solid transparent;min-height:32px}
.ch-item.hd{background:linear-gradient(135deg,#1e3a5f 0%,#234a78 100%);border-color:#3B82F6}
.ch-item.sd{background:#3a3a3a;border-color:#525252}
.ch-num{font-size:9px;color:#9ca3af;font-weight:700}
.ch-name{font-size:9px;color:#fff;font-weight:800;margin-top:1px;line-height:1.2}
.ch-item.hd .ch-name{color:#BFDBFE}
.ch-item.sd .ch-name{color:#D1D5DB}
.ch-hd-badge{position:absolute;top:-5px;right:-4px;background:#3B82F6;color:#fff;font-size:7px;font-weight:900;padding:1px 4px;border-radius:4px;letter-spacing:.3px;box-shadow:0 1px 3px rgba(59,130,246,.55);line-height:1.1}
.ch-sd-badge{position:absolute;top:-5px;right:-4px;background:#6B7280;color:#fff;font-size:7px;font-weight:900;padding:1px 4px;border-radius:4px;letter-spacing:.3px;line-height:1.1}
.ch-cat-title{font-size:11px;font-weight:900;color:#FCD34D;margin:10px 0 6px;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.ch-cat-title::before{content:'▸';color:#E30613;font-size:13px}
.ch-legend{display:flex;gap:12px;margin:6px 0 12px;flex-wrap:wrap;background:#F3F4F6;padding:8px 10px;border-radius:8px;border:1px solid #E5E7EB}
.ch-legend-item{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:#374151}
.ch-legend-swatch{width:14px;height:14px;border-radius:3px;display:inline-block;flex-shrink:0}
.ch-legend-swatch.hd{background:linear-gradient(135deg,#1e3a5f,#234a78);border:1px solid #3B82F6}
.ch-legend-swatch.sd{background:#3a3a3a;border:1px solid #525252}

/* ── STARS BANNER ────────────────────────────────────────────────── */
.stars-banner{background:linear-gradient(135deg,#1a1a1a,#374151);border-radius:12px;padding:12px;margin-bottom:12px;text-align:center}
.stars-banner-title{color:#FCD34D;font-size:14px;font-weight:900}
.stars-banner-sub{color:rgba(255,255,255,.55);font-size:10px;margin-top:3px}

/* ── PREMIUM LIST ────────────────────────────────────────────────── */
.prem-list{margin-top:6px}
.prem-row{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border-radius:8px;margin-bottom:4px;background:#f8f8f8;border:1px solid #eee}
.prem-name{font-size:11px;font-weight:800;color:#1a1a1a}
.prem-price{font-size:13px;font-weight:900;color:#E30613}

/* ── NAV ─────────────────────────────────────────────────────────── */
.nav-row{display:flex;gap:8px;margin-top:14px}
.btn-back{padding:10px 16px;border-radius:10px;border:1.5px solid #e0e0e0;background:#fff;cursor:pointer;font-size:13px;font-weight:800;color:#666;font-family:'Nunito',sans-serif;transition:all .12s}
.btn-back:hover{background:#f5f5f5}
.btn-restart{flex:1;padding:10px;border-radius:10px;border:1.5px solid #E30613;background:#fff5f5;cursor:pointer;font-size:13px;font-weight:800;color:#E30613;font-family:'Nunito',sans-serif;transition:all .12s}
.btn-restart:hover{background:#FEE2E2}
.btn-action{width:100%;padding:11px;border-radius:10px;border:1.5px solid #E30613;background:#fff5f5;cursor:pointer;font-size:13px;font-weight:800;color:#E30613;font-family:'Nunito',sans-serif;margin-top:10px;transition:all .12s}
.btn-action:hover{background:#FEE2E2}
.result-header{text-align:center;padding:10px;margin-bottom:10px}
.result-icon{font-size:32px;margin-bottom:5px}
.result-title{font-size:16px;font-weight:900;color:#1a1a1a}
.result-sub{font-size:11px;color:#888}
.footer{background:#f8f8f8;padding:10px 20px;text-align:center;font-size:10px;color:#bbb;font-weight:600}

/* ── PASSWORD OVERLAY ────────────────────────────────────────────── */
#pwd-overlay{
  position:fixed;inset:0;z-index:9999;
  background:#E30613;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:30px 24px;
  animation:ovIn .35s ease;
}
@keyframes ovIn{from{opacity:0}to{opacity:1}}
#pwd-overlay.hide{animation:ovOut .45s ease forwards}
@keyframes ovOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(1.04)}}
.ov-logo{font-size:32px;font-weight:900;color:#fff;letter-spacing:3px;line-height:1;margin-bottom:4px}
.ov-sub{font-size:10px;font-weight:700;color:rgba(255,255,255,.55);letter-spacing:4px;text-transform:uppercase;margin-bottom:32px}
.ov-logo-official{margin-bottom:18px;width:100%;display:flex;justify-content:center}
.ov-hero{position:relative;width:100%;max-width:340px;height:130px;border-radius:14px;overflow:hidden;margin-bottom:18px;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.ov-hero-img{width:100%;height:100%;object-fit:cover;display:block}
.ov-hero::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(227,6,19,.15) 0%,rgba(0,0,0,.05) 50%,rgba(227,6,19,.45) 100%);pointer-events:none}
.ov-hero-badge{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);color:#fff;font-size:10px;font-weight:900;padding:4px 9px;border-radius:6px;letter-spacing:.4px;z-index:2}
.ov-card{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.ov-title{font-size:18px;font-weight:900;color:#1a1a1a;text-align:center;margin-bottom:4px}
.ov-hint{font-size:11px;color:#aaa;text-align:center;margin-bottom:22px;font-weight:600}
.ov-field-wrap{position:relative;margin-bottom:14px}
.ov-input{
  width:100%;border:2px solid #e0e0e0;border-radius:12px;
  padding:13px 44px 13px 16px;font-size:16px;font-weight:800;
  font-family:'Nunito',sans-serif;color:#1a1a1a;letter-spacing:2px;
  outline:none;transition:border-color .15s;background:#f8f8f8;
}
.ov-input:focus{border-color:#E30613;background:#fff}
.ov-input.error{border-color:#E30613;animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.ov-eye{position:absolute;right:13px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:18px;user-select:none;opacity:.45}
.ov-eye:hover{opacity:.8}
.ov-btn{
  width:100%;padding:14px;border-radius:12px;border:none;
  background:#E30613;color:#fff;font-size:15px;font-weight:900;
  font-family:'Nunito',sans-serif;cursor:pointer;
  transition:background .15s,transform .1s;letter-spacing:.5px;
}
.ov-btn:hover{background:#c50511}
.ov-btn:active{transform:scale(.97)}
.ov-error{font-size:11px;color:#E30613;font-weight:800;text-align:center;margin-top:10px;min-height:16px;transition:opacity .2s}
.ov-footer{font-size:10px;color:rgba(255,255,255,.4);text-align:center;margin-top:24px;font-weight:600}

/* ── DECORATIVE LOGO (corner) ────────────────────────────────────── */
.deco-logo{
  position:absolute;
  bottom:14px;right:16px;
  width:78px;height:auto;
  opacity:.22;
  pointer-events:none;
  user-select:none;
}
.deco-logo svg{width:100%;height:auto;display:block}
.deco-logo.deco-pwd svg path,
.deco-logo.deco-pwd svg polygon,
.deco-logo.deco-pwd svg rect{fill:#fff !important}
.app{position:relative}
.deco-logo.deco-app{
  bottom:auto;top:14px;right:14px;
  width:54px;
  opacity:.13;
  z-index:0;
}
.app-header{position:relative;z-index:1}

/* Logo Claro VTR oficial en overlay del password (esquina inferior) */
.deco-logo-pwd{
  position:absolute;
  bottom:18px;left:50%;
  transform:translateX(-50%);
  width:140px;
  opacity:.85;
  pointer-events:none;
  user-select:none;
}
.deco-logo-pwd img{width:100%;height:auto;display:block;border-radius:6px}

/* ── CUPÓN HERO CARD (Nueva oferta destacada hogar) ─────────────── */
.cupon-hero-card{
  border:2.5px solid #E30613;
  background:#fff;
  padding:0 !important;
  overflow:hidden;
  box-shadow:0 8px 24px rgba(227,6,19,.28);
  margin-bottom:14px;
  position:relative;
}
.cupon-hero-card::before{display:none}
.cupon-hero-img{
  width:100%;
  min-height:180px;
  background-size:cover;
  background-position:center top;
  position:relative;
}
.cupon-hero-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(227,6,19,.92) 0%,rgba(227,6,19,.6) 45%,rgba(0,0,0,.15) 100%);
  padding:14px 16px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}
.cupon-hero-badges{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:8px;
  flex-wrap:wrap;
}
.cupon-badge-new{
  background:#FCD34D;
  color:#7C2D12;
  font-size:11px;
  font-weight:900;
  padding:5px 11px;
  border-radius:20px;
  letter-spacing:.5px;
  box-shadow:0 2px 6px rgba(0,0,0,.18);
  animation:cupon-pulse 2.4s ease-in-out infinite;
}
@keyframes cupon-pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.06)}
}
.cupon-badge-vig{
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(4px);
  color:#fff;
  font-size:10px;
  font-weight:900;
  padding:4px 9px;
  border-radius:6px;
  letter-spacing:.4px;
}
.cupon-hero-title{
  color:#fff;
  font-size:22px;
  font-weight:900;
  line-height:1.1;
  margin-top:auto;
  text-shadow:0 2px 8px rgba(0,0,0,.35);
}
.cupon-hero-sub{
  color:rgba(255,255,255,.96);
  font-size:12px;
  font-weight:800;
  margin-top:3px;
  text-shadow:0 1px 4px rgba(0,0,0,.4);
}
.cupon-hero-price-row{
  display:flex;
  align-items:baseline;
  gap:8px;
  margin-top:8px;
  flex-wrap:wrap;
}
.cupon-hero-from{
  color:rgba(255,255,255,.72);
  font-size:14px;
  font-weight:800;
  text-decoration:line-through;
}
.cupon-hero-arrow{
  color:rgba(255,255,255,.85);
  font-size:14px;
  font-weight:900;
}
.cupon-hero-price{
  color:#FCD34D;
  font-size:30px;
  font-weight:900;
  line-height:1;
  text-shadow:0 2px 6px rgba(0,0,0,.4);
}
.cupon-hero-period{
  color:#fff;
  font-size:11px;
  font-weight:800;
  background:rgba(0,0,0,.3);
  padding:2px 8px;
  border-radius:5px;
}
.cupon-body{padding:12px 14px}
.cupon-marca-row{
  display:flex;
  gap:5px;
  flex-wrap:wrap;
  margin-bottom:10px;
}
.cupon-marca-tag{
  font-size:10px;
  font-weight:900;
  padding:3px 9px;
  border-radius:5px;
  letter-spacing:.5px;
}
.cupon-marca-tag.claro{background:#E30613;color:#fff}
.cupon-marca-tag.vtr{background:#1a1a1a;color:#fff}
.cupon-marca-tag.canal{background:#E5E7EB;color:#374151}
.cupon-coupon-box{
  background:linear-gradient(135deg,#FEF3C7 0%,#FCD34D 100%);
  border:1.5px dashed #B45309;
  border-radius:10px;
  padding:10px 12px;
  display:flex;
  align-items:center;
  gap:10px;
  position:relative;
}
.cupon-coupon-box::before,
.cupon-coupon-box::after{
  content:'';
  position:absolute;
  top:50%;
  width:12px;
  height:12px;
  background:#fff;
  border-radius:50%;
  transform:translateY(-50%);
}
.cupon-coupon-box::before{left:-7px;box-shadow:inset -2px 0 4px rgba(0,0,0,.08)}
.cupon-coupon-box::after{right:-7px;box-shadow:inset 2px 0 4px rgba(0,0,0,.08)}
.cupon-coupon-icon{font-size:28px;line-height:1;filter:drop-shadow(0 2px 3px rgba(0,0,0,.15))}
.cupon-coupon-content{flex:1}
.cupon-coupon-title{font-size:15px;font-weight:900;color:#7C2D12;line-height:1}
.cupon-coupon-sub{font-size:10px;font-weight:700;color:#92400E;margin-top:3px;line-height:1.35}

/* ── NUEVA TÁCTICA (Star reforzado) ──────────────────────────────── */
.offer-card.star-new{
  background:linear-gradient(135deg,#FEF2F2 0%,#FFE4E1 60%,#FEF3C7 100%);
  border:2px solid #E30613;
  box-shadow:0 4px 14px rgba(227,6,19,.18);
  position:relative;
}
.offer-card.star-new::before{background:linear-gradient(180deg,#E30613,#92400E);width:5px}
.star-badge.new-badge{
  background:linear-gradient(135deg,#E30613,#9B1B1B);
  color:#fff;
  font-size:11px;
  padding:3px 10px;
  letter-spacing:.4px;
  box-shadow:0 2px 6px rgba(227,6,19,.35);
}
.vig-pill{
  background:#1a1a1a;color:#FCD34D;
  font-size:9px;font-weight:900;
  padding:3px 9px;border-radius:20px;
  letter-spacing:.3px;
}
.offer-card.star-new .offer-price.star-price{
  color:#E30613;font-size:24px;
}

/* ── BOX DE RESTRICCIONES ────────────────────────────────────────── */
.restric-box{
  margin-top:9px;
  background:#FFFBEB;
  border:1.5px solid #F59E0B;
  border-radius:10px;
  padding:9px 11px;
}
.restric-title{
  font-size:10px;font-weight:900;
  color:#92400E;
  text-transform:uppercase;
  letter-spacing:.3px;
  margin-bottom:5px;
}
.restric-list{
  list-style:none;
  margin:0;padding:0;
}
.restric-list li{
  font-size:11px;
  color:#78350F;
  font-weight:600;
  line-height:1.45;
  padding:2px 0 2px 14px;
  position:relative;
}
.restric-list li::before{
  content:'•';
  position:absolute;
  left:3px;top:1px;
  color:#E30613;
  font-weight:900;
  font-size:13px;
}
.restric-list li strong{color:#92400E;font-weight:900}

/* ── PLCARD: Nueva Táctica embedded ──────────────────────────────── */
.pl-card.star-new-card{
  background:linear-gradient(135deg,#FFFBEB 0%,#FEE2E2 100%);
  border:1.5px solid #E30613;
  box-shadow:0 3px 10px rgba(227,6,19,.12);
}
.pl-card.star-new-card::before{background:#E30613;width:4px}
.nueva-tactica{
  margin-top:7px;
  background:#fff;
  border:1.5px dashed #E30613;
  border-radius:8px;
  padding:7px 9px;
}
.nt-row{
  display:flex;
  align-items:center;
  gap:7px;
  flex-wrap:wrap;
}
.nt-flag{
  background:#E30613;color:#fff;
  font-size:9px;font-weight:900;
  padding:2px 7px;border-radius:6px;
  letter-spacing:.3px;
}
.nt-price{
  font-size:16px;font-weight:900;
  color:#E30613;
  line-height:1;
}
.nt-temp{
  font-size:10px;font-weight:800;
  color:#92400E;
  background:#FEF3C7;
  padding:2px 6px;border-radius:5px;
}
.nt-detail{
  font-size:10px;color:#6B7280;
  font-weight:600;
  margin-top:4px;
}
.nt-restric{
  list-style:none;
  margin:6px 0 0;padding:0;
  border-top:1px dashed #FCA5A5;
  padding-top:5px;
}
.nt-restric li{
  font-size:10px;
  color:#78350F;
  font-weight:600;
  line-height:1.4;
  padding:1px 0 1px 11px;
  position:relative;
}
.nt-restric li::before{
  content:'›';
  position:absolute;
  left:2px;top:0;
  color:#E30613;
  font-weight:900;
  font-size:12px;
}
.nt-restric li strong{color:#92400E;font-weight:900}
</style>

      <input class="ov-input" id="pwd-input" type="password"

             autocomplete="off" autocorrect="off" spellcheck="false"
             onkeydown="if(event.key==='Enter')checkPwd()">
      <span class="ov-eye" id="pwd-eye" onclick="toggleEye()">👁️</span>

<script>
// ── CONTRASEÑA — cambiar aquí ─────────────────────────────────────
const ACCESS_PWD = "Terr3n0@2026";
// ─────────────────────────────────────────────────────────────────

function checkPwd(){
  const val = document.getElementById('pwd-input').value;
  const err = document.getElementById('pwd-error');
  const inp = document.getElementById('pwd-input');
  if(val === ACCESS_PWD){
    err.textContent = '';
    const ov = document.getElementById('pwd-overlay');
    ov.classList.add('hide');
    setTimeout(()=>ov.remove(), 460);
  } else {
    err.textContent = '❌ Contraseña incorrecta. Intenta nuevamente.';
    inp.classList.add('error');
    inp.value = '';
    setTimeout(()=>inp.classList.remove('error'), 400);
    inp.focus();
  }
}
function toggleEye(){
  const inp = document.getElementById('pwd-input');
  const eye = document.getElementById('pwd-eye');
  if(inp.type==='password'){inp.type='text'; eye.textContent='🙈';}
  else{inp.type='password'; eye.textContent='👁️';}
}
document.getElementById('pwd-input').focus();
</script>

// ── OTT MINI BLOCK (dentro de cada plan card) ─────────────────────────────────
function ottMini(ottNivel, ottMarca){
  let appsClaro=[], appsVtr=[], nivelCls=OTT_NIVEL_CLS[ottNivel]||'';
  if(ottNivel){
    if(ottMarca==='claro'||ottMarca==='ambos') appsClaro=OTT_DATA.claro[ottNivel]||[];
    if(ottMarca==='vtr'  ||ottMarca==='ambos') appsVtr  =OTT_DATA.vtr[ottNivel]  ||[];
  }

  let h=`<div class="pl-ott"><div class="pl-ott-header">`;
  h+=`<span class="pl-ott-label">📺 OTT Incluidas</span>`;
  if(ottNivel) h+=`<span class="pl-ott-nivel ${nivelCls}">${OTT_NIVEL_LABEL[ottNivel]}</span>`;
  h+=`</div>`;

  if(!ottNivel){
    h+=`<div class="pl-ott-apps"><span class="pl-ott-app pa-none">No incluye OTT</span></div>`;
  } else if(ottMarca==='ambos'){
    // Mostrar ambas marcas con separador
    h+=`<div style="font-size:8px;font-weight:900;color:#E30613;text-transform:uppercase;margin-bottom:3px">CLARO</div>`;
    h+=`<div class="pl-ott-apps">${appsClaro.map(a=>`<span class="pl-ott-app ${a.cls}">${a.n}</span>`).join('')}</div>`;
    h+=`<div style="font-size:8px;font-weight:900;color:#7C3AED;text-transform:uppercase;margin:4px 0 3px">VTR</div>`;
    h+=`<div class="pl-ott-apps">${appsVtr.map(a=>`<span class="pl-ott-app ${a.cls}">${a.n}</span>`).join('')}</div>`;
    h+=`<div style="font-size:9px;color:#92400E;font-weight:700;margin-top:4px">⚠️ Contenido puede variar entre marcas</div>`;
  } else {
    const apps = ottMarca==='claro' ? appsClaro : appsVtr;
    h+=`<div class="pl-ott-apps">${apps.map(a=>`<span class="pl-ott-app ${a.cls}">${a.n}</span>`).join('')}</div>`;
  }
  h+=`</div>`;
  return h;
}

// ── PLAN CARD (con OTT integrado) ─────────────────────────────────────────────
function plCard(p){
  let h=`<div class="pl-card${p.star?' star':''}${p.starNueva?' star-new-card':''}">`;
  if(p.starNueva) h+=`<div style="margin-bottom:4px">${tag('tag-red','\uD83D\uDD25 NUEVA T\u00C1CTICA')}${tag('tag-gold','\u2B50 Precio Estrella')}</div>`;
  else if(p.star) h+=`<div style="margin-bottom:4px">${tag('tag-gold','\u2B50 Precio Estrella')}</div>`;
  h+=`<div class="pl-header"><div class="pl-name">${p.nombre}</div><span class="pl-marca">${p.marca} · ${p.red}${p.mb?' · '+p.mb+'M':''}</span></div>`;
  h+=`<div class="pl-prices">`;
  if(p.tac>0){
    h+=`<span class="pl-base">${fmt(p.precio)}</span>`;
    if(p.promo>0) h+=`<span class="pl-promo">${fmt(p.promo)}</span><span style="font-size:9px;color:#aaa">\u2192</span>`;
    h+=`<span class="pl-tac">${fmt(p.tac)}</span><span class="pl-lbl tac">T\u00E1ctico ${p.temp}</span>`;
  } else if(p.promo>0){
    h+=`<span class="pl-base">${fmt(p.precio)}</span><span class="pl-promo">${fmt(p.promo)}</span><span class="pl-lbl">Promo Nacional</span>`;
  } else {
    h+=`<span class="pl-promo">${fmt(p.precio)}</span><span class="pl-lbl">Precio base</span>`;
  }
  h+=`</div>`;
  // ── NUEVA OFERTA TÁCTICA (si aplica) ──
  if(p.starNueva && p.nuevaTac){
    h+=`<div class="nueva-tactica">
      <div class="nt-row">
        <span class="nt-flag">\uD83D\uDD25 NUEVA</span>
        <span class="nt-price">${fmt(p.nuevaTac)}</span>
        <span class="nt-temp">${p.nuevaTemp}</span>
      </div>
      <div class="nt-detail">Dcto t\u00E1ctico ${fmt(p.nuevaTacDcto)} \u00B7 sobre precio base ${fmt(p.precio)}</div>`;
    if(p.restriccion){
      h+=`<ul class="nt-restric">
        <li>Tarifa basal comisi\u00F3n: <strong>$40.000</strong></li>
        <li><strong>No compatible</strong> con incentivos ni concursos</li>
        <li>Disponible en <strong>todo el canal</strong> (Dealers \u00B7 Directa \u00B7 Agencia)</li>
      </ul>`;
    }
    h+=`</div>`;
  }
  if(p.nota) h+=`<div style="font-size:10px;color:#065F46;font-weight:700;margin-top:3px">\u2705 ${p.nota}</div>`;
  // ── OTT BLOCK ──
  h+=ottMini(p.ott, p.ottM);
  h+=`</div>`;
  return h;
}

function renderPriceList(data,soloVtr){
  let h='';
  if(soloVtr) h+=`<div class="info-box" style="margin-bottom:10px"><div class="warn-icon">📌</div><div class="info-text">Planes 2 y 3 Play son <strong>exclusivos VTR</strong>. Los planes Streaming pueden tener diferencias de precio entre marcas.</div></div>`;
  const groups={};
  data.forEach(p=>{const k=p.mb?p.mb+'M':'TV/Fono';if(!groups[k])groups[k]=[];groups[k].push(p);});
  for(const k in groups){
    const isTV=k==='TV/Fono';
    h+=speedGroup(isTV?null:parseInt(k),isTV?'\uD83D\uDCFA TV / Telefon\u00EDa':'\uD83D\uDCE1 Internet');
    groups[k].forEach(p=>{h+=plCard(p);});
  }
  h+=`<div class="info-box" style="margin-top:10px"><div class="warn-icon">\uD83D\uDCCC</div><div class="info-text">Planes TV solo cable: instalaci\u00F3n $50.000</div></div>`;
  return h;
}

// ── RENDER SCREEN ─────────────────────────────────────────────────────────────
function renderScreen(id){
  const s=SCREENS[id];if(!s)return;
  const area=document.getElementById('screen-area');
  let html='<div class="screen">';
  if(s.type==='result'){
    html+=renderResult(s);
  } else {
    html+=`<div class="qbox"><div class="qicon">${s.icon}</div><div class="qtext">${s.q}</div>${s.hint?`<div class="qhint">${s.hint}</div>`:''}</div>
    <div class="choices ${s.cols===2?'cols2':''}">`;
    s.choices.forEach(c=>{html+=`<button class="choice-btn" onclick="navigate('${c.next}')"><div class="choice-icon">${c.icon}</div><div><div class="choice-label">${c.label}</div>${c.desc?`<div class="choice-desc">${c.desc}</div>`:''}</div></button>`;});
    html+='</div>';
  }
  if(history.length>0){html+=`<div class="nav-row"><button class="btn-back" onclick="goBack()">\u2190 Volver</button><button class="btn-restart" onclick="restart()">\uD83D\uDD04 Reiniciar</button></div>`;}
  html+='</div>';
  area.innerHTML=html;
  const bc=document.getElementById('breadcrumb');
  bc.innerHTML=[...history,current].map((id2,i,arr)=>`<span class="bc-item ${i===arr.length-1?'active':''}">${BREAD[id2]||id2}</span>`).join('');
}
function navigate(id){history.push(current);current=id;renderScreen(id);}
function goBack(){if(!history.length)return;current=history.pop();renderScreen(current);}
function restart(){history=[];current='start';renderScreen('start');}
renderScreen('start');
</script>
